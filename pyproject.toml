[project]
name = "msc_thesis_awn_aperghis"
version = "1.0.0"
description = "template repository to include overleaf report"
authors = [{ name = "Albert Aperghis", email = "a.w.n.aperghis@student.tudelft.nl" }]
requires-python = ">=3.10"
readme = "README.md"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
]
package-mode = false
dependencies = [
    "matplotlib>=3.10.8",
    "numpy>=2.2.6",
]

[tool.uv]
package = false

[build-system]
requires = ["uv_build>=0.9.11,<0.10.0"]
build-backend = "uv_build"
